name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Packages
        run: |
          npm i -g corepack@latest
          corepack enable
          pnpm install

      - name: Build and Test Code
        run: |
          pnpm run build
          pnpm run test
          pnpm biome ci src

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-artifacts
          path: dist/
          retention-days: 1

  deploy-github:
    name: Deploy to GitHub
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-artifacts
          path: dist/

      - name: Rename userscript for GitHub Release
        run: cp dist/index.user.js dist/ados-helper.user.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/ados-helper.user.js

  deploy-azure:
    name: Deploy to Azure
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-artifacts
          path: dist/

      - name: Upload to Azure Blob Storage
        uses: bacongobbler/azure-blob-storage-upload@main
        with:
          source_dir: dist
          container_name: apps
          extra_args: "--destination-path ados-helper"
          connection_string: ${{ secrets.BLOB_CONNECTION_STRING }}
          overwrite: "true"

  deploy-gist:
    name: Deploy to GitHub Gist
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-artifacts
          path: dist/

      - name: Deploy to Gist
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: ${{ vars.GIST_ID }}
          file_path: dist/index.user.js
          gist_file_name: ados-helper.user.js

  deploy-tauri:
    name: Deploy Tauri App
    needs: [build, deploy-github]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Packages
        run: |
          npm i -g corepack@latest
          corepack enable
          pnpm install

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Release v__VERSION__"
          releaseBody: "Automated release of ADOS Helper"
          releaseDraft: false
          prerelease: false

      - name: Rename and Prepare Bare Executable
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target" -Filter "app.exe" -Recurse | Where-Object { $_.FullName -like "*release*" } | Select-Object -First 1
          if ($exe) {
            New-Item -ItemType Directory -Force -Path "src-tauri/target/release"
            Copy-Item $exe.FullName "src-tauri/target/release/ados-helper.exe" -Force
          }
        shell: pwsh

      - name: Upload Bare Executable to Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/ados-helper.exe
